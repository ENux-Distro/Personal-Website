<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emoji Motivator 🌲</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #2ea043;
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --border: #30363d;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Header Section --- */
        header {
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 { font-size: 1.4rem; margin: 0; color: var(--text-main); }
        .season-tag { font-size: 0.8rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }

        /* --- Tree Display Section --- */
        #display-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            padding: 30px 0;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #tree-emoji { font-size: 100px; display: block; margin: 10px 0; transition: transform 0.3s ease; }
        
        .progress-stats {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid var(--border);
            margin-top: 20px;
            padding-top: 15px;
        }

        .stat-box span { display: block; }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-val { font-size: 1.1rem; font-weight: bold; color: var(--accent); }

        /* --- Task Section --- */
        .task-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        h2 { font-size: 1rem; margin-top: 0; color: var(--text-dim); margin-bottom: 15px; }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .task-item:last-child { border-bottom: none; }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: var(--accent);
        }

        input[type="number"] {
            background: #000;
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 8px;
            width: 60px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        /* --- Action Button --- */
        .sync-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            max-width: 400px;
            padding: 18px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(46, 160, 67, 0.4);
        }

        .sync-btn:active { transform: scale(0.98); }

    </style>
</head>
<body>

    <header>
        <div class="season-tag">Season <span id="season-num">1</span></div>
        <h1>Emoji Motivator 🌲</h1>
    </header>

    <div id="display-card">
        <div id="tree-emoji">🌱</div>
        <div class="progress-stats">
            <div class="stat-box">
                <span class="stat-label">Season Day</span>
                <span class="stat-val" id="days-left">1/30</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Total XP</span>
                <span class="stat-val" id="total-xp">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Streak</span>
                <span class="stat-val" id="streak">0</span>
            </div>
        </div>
    </div>

    <div class="task-card">
        <h2>Daily Tasks</h2>
        
        <div class="task-item">
            <span>🪥 Morning Self-Care</span>
            <input type="checkbox" id="t1">
        </div>

        <div class="task-item">
            <span>💪 Pushups/Situps/Weights</span>
            <input type="checkbox" id="t2">
        </div>

        <div class="task-item">
            <span>🎹 Piano Practice</span>
            <input type="checkbox" id="t3">
        </div>

        <div class="task-item">
            <span>📚 Reading Book</span>
            <input type="checkbox" id="t4">
        </div>

        <div class="task-item" style="margin-top: 10px;">
            <span>📝 Questions Solved:</span>
            <input type="number" id="q-count" placeholder="0">
        </div>
    </div>

    <button class="sync-btn" onclick="syncDaily()">SYNC & LOG DAY</button>

    <script>
        // --- Storage & State Management ---
        let state = JSON.parse(localStorage.getItem('emojiMotivatorData')) || {
            xp: 0,
            streak: 0,
            season: 1,
            seasonStart: Date.now(),
            lastSync: null
        };

        function checkSeasonReset() {
            const now = Date.now();
            const daysPassed = Math.floor((now - state.seasonStart) / (1000 * 60 * 60 * 24));
            
            if (daysPassed >= 30) {
                alert("Season Complete! Your tree has been archived in the forest. New season starting!");
                state.season += 1;
                state.xp = 0;
                state.seasonStart = Date.now();
                save();
            }
            return daysPassed + 1;
        }

        function save() {
            localStorage.setItem('emojiMotivatorData', JSON.stringify(state));
            updateUI();
        }

        function updateUI() {
            const currentDay = checkSeasonReset();
            document.getElementById('season-num').innerText = state.season;
            document.getElementById('days-left').innerText = `${currentDay}/30`;
            document.getElementById('total-xp').innerText = state.xp;
            document.getElementById('streak').innerText = `${state.streak} 🔥`;

            // Tree Growth Logic
            const tree = document.getElementById('tree-emoji');
            if (state.xp < 150) tree.innerText = "🌱";
            else if (state.xp < 400) tree.innerText = "🌿";
            else if (state.xp < 800) tree.innerText = "🌳";
            else if (state.xp < 1200) tree.innerText = "🍎";
            else tree.innerText = "🌲";
        }

        function syncDaily() {
            let dailyXP = 0;
            
            // 1. Calculate XP
            if(document.getElementById('t1').checked) dailyXP += 10;
            if(document.getElementById('t2').checked) dailyXP += 20;
            if(document.getElementById('t3').checked) dailyXP += 10;
            if(document.getElementById('t4').checked) dailyXP += 10;

            const qVal = parseInt(document.getElementById('q-count').value) || 0;
            if (qVal >= 50) dailyXP += 50; 
            else if (qVal > 0) dailyXP += 15;

            // 2. Update State
            state.xp += dailyXP;
            
            // Streak Logic: If synced today, don't double streak, but keep it.
            const today = new Date().toDateString();
            if (state.lastSync !== today) {
                state.streak += 1;
                state.lastSync = today;
            }

            // 3. RESET UI (As requested)
            document.getElementById('t1').checked = false;
            document.getElementById('t2').checked = false;
            document.getElementById('t3').checked = false;
            document.getElementById('t4').checked = false;
            document.getElementById('q-count').value = "";

            save();
            alert(`Great work! +${dailyXP} XP added to your tree.`);
        }

        // Initialize
        updateUI();

        // Basic Notification Polling
        setInterval(() => {
            const h = new Date().getHours();
            const m = new Date().getMinutes();
            if (m === 0 && (h === 8 || h === 18 || h === 20)) {
                if (Notification.permission === "granted") {
                    new Notification("Emoji Motivator 🌲", { body: "Time to grow your tree! Check your tasks." });
                }
            }
        }, 60000);
    </script>
</body>
</html>
